<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Deutsche Deadlock Community">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"></stop>
      <stop offset="55%" stop-color="#6D4AE8"></stop>
      <stop offset="100%" stop-color="#A855F7"></stop>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3.5" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  
  <polygon points="50,4 96,50 50,96 4,50" fill="rgba(6,182,212,0.08)" stroke="url(#g)" stroke-width="2.5" filter="url(#glow)"></polygon>

  
  <polygon points="50,22 78,50 50,78 22,50" fill="none" stroke="url(#g)" stroke-width="1.2" opacity="0.45"></polygon>

  
  <circle cx="50" cy="50" r="5" fill="url(#g)" opacity="0.9"></circle>
</svg>