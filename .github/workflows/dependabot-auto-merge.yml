name: "Dependabot Auto Merge"

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  auto-merge:
    name: "Auto-merge trusted Dependabot updates"
    if: github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          alert-lookup: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide eligibility
        id: gate
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          ALERT_STATE: ${{ steps.metadata.outputs.alert-state }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          DIRECTORY: ${{ steps.metadata.outputs.directory }}
          MAINTAINER_CHANGES: ${{ steps.metadata.outputs.maintainer-changes }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
          PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        with:
          script: |
            const names = (process.env.DEPENDENCY_NAMES || "")
              .split(",")
              .map((value) => value.trim())
              .filter(Boolean);
            const updateType = process.env.UPDATE_TYPE || "";
            const securityUpdate = (process.env.ALERT_STATE || "").toUpperCase() === "OPEN";
            const maintainerChanges = (process.env.MAINTAINER_CHANGES || "").toLowerCase() === "true";
            const ecosystem = process.env.PACKAGE_ECOSYSTEM || "";
            const directory = process.env.DIRECTORY || "";
            const newVersion = process.env.NEW_VERSION || "";

            let shouldMerge = false;
            let reason = "unsupported update type";

            if (maintainerChanges) {
              reason = "maintainer changes detected";
            } else if (securityUpdate) {
              shouldMerge = true;
              reason = "security update";
            } else if (
              updateType.startsWith("version-update:") ||
              names.length > 0
            ) {
              shouldMerge = true;
              reason = updateType || "dependabot version update";
            }

            core.setOutput("should_merge", shouldMerge ? "true" : "false");
            core.setOutput("reason", reason);
            core.notice(`Auto-merge decision: ${shouldMerge} (${reason})`);

      - name: Auto-approve PR
        if: steps.gate.outputs.should_merge == 'true' && github.event.pull_request.draft == false
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const alreadyApproved = reviews.some(
              (review) =>
                review.user?.login === "github-actions[bot]" &&
                review.state === "APPROVED",
            );

            if (alreadyApproved) {
              core.notice(`PR #${pull_number} is already approved by github-actions[bot].`);
              return;
            }

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              event: "APPROVE",
              body: "Auto-approved trusted Dependabot update after policy checks.",
            });

      - name: Merge PR
        if: steps.gate.outputs.should_merge == 'true' && github.event.pull_request.draft == false
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            for (let attempt = 1; attempt <= 12; attempt += 1) {
              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number,
                  merge_method: "squash",
                });
                core.notice(`PR #${pull_number} merged successfully on attempt ${attempt}.`);
                return;
              } catch (error) {
                const message = String(error?.message || error);
                const retryable = message.includes("405") || message.includes("Base branch was modified");
                if (retryable && attempt < 12) {
                  core.notice(`Could not merge PR #${pull_number}; retrying in 10s (attempt ${attempt}/12): ${message}`);
                  await sleep(10_000);
                  continue;
                }
                core.warning(`Could not merge PR #${pull_number}: ${message}`);
                return;
              }
            }

      - name: Skip note
        if: steps.gate.outputs.should_merge != 'true'
        run: |
          echo "Dependabot PR does not meet auto-merge policy: ${{ steps.gate.outputs.reason }}"

  reconcile-open-prs:
    name: "Reconcile open Dependabot PRs"
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Approve and enable auto-merge for open Dependabot PRs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const dependabotPulls = pulls.filter(
              (pull) => pull.user?.login === "dependabot[bot]" && pull.draft === false,
            );

            for (const pull of dependabotPulls) {
              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: pull.number,
                per_page: 100,
              });

              const alreadyApproved = reviews.some(
                (review) =>
                  review.user?.login === "github-actions[bot]" &&
                  review.state === "APPROVED",
              );

              if (!alreadyApproved) {
                await github.rest.pulls.createReview({
                  owner,
                  repo,
                  pull_number: pull.number,
                  event: "APPROVE",
                  body: "Auto-approved trusted Dependabot update after policy checks.",
                });
              }

              // Skip PRs that touch workflow files — GITHUB_TOKEN cannot merge those
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pull.number,
                per_page: 100,
              });
              const touchesWorkflows = files.some((f) => f.filename.startsWith(".github/workflows/"));
              if (touchesWorkflows) {
                core.notice(`PR #${pull.number} modifies workflow files — requires manual merge (GITHUB_TOKEN lacks workflow scope).`);
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pull.number,
                  merge_method: "squash",
                });
                core.notice(`PR #${pull.number} merged successfully.`);
              } catch (error) {
                core.warning(`Could not merge PR #${pull.number}: ${String(error?.message || error)}`);
              }
            }
