name: 'Dependency Review & Security'

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review (PR context)
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: low
          fail-on-scopes: runtime,development
          deny-licenses: GPL-3.0, AGPL-3.0

      - name: Dependency Review (push comparison)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          base-ref: ${{ github.event.before }}
          head-ref: ${{ github.sha }}
          fail-on-severity: low
          fail-on-scopes: runtime,development
          deny-licenses: GPL-3.0, AGPL-3.0

      - name: Dependency Review (skip without diff context)
        if: github.event_name == 'schedule' || (github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000')
        run: |
          echo "Skipping dependency-review-action: no PR context and no valid base/head diff available."

      - name: Setup Node.js
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group' && hashFiles('**/package-lock.json', '**/npm-shrinkwrap.json') != ''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: NPM Audit (recursive lockfile scan)
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group' && hashFiles('**/package-lock.json', '**/npm-shrinkwrap.json') != ''
        run: |
          mkdir -p dependency-reports/npm
          found=0
          audit_fail=0

          while IFS= read -r lock_file; do
            found=1
            dir_path="$(dirname "$lock_file")"
            rel_dir="${dir_path#./}"
            safe_name="$(echo "${rel_dir:-root}" | sed 's#[^A-Za-z0-9._-]#_#g')"
            echo "Auditing Node dependencies in: $dir_path"
            if ! (
              cd "$dir_path"
              npm audit --audit-level=low --json > "$GITHUB_WORKSPACE/dependency-reports/npm/${safe_name}.json"
            ); then
              audit_fail=1
            fi
          done < <(find . -type f \( -name "package-lock.json" -o -name "npm-shrinkwrap.json" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/.git/*" | sort)

          if [ "$found" -eq 0 ]; then
            echo "No npm lockfiles found for recursive audit."
          fi

          if [ "$audit_fail" -ne 0 ]; then
            echo "NPM audit found vulnerabilities (see dependency-reports/npm)."
            exit 1
          fi

      - name: Set up Python
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group' && hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/Pipfile.lock', '**/poetry.lock') != ''
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install Python audit tooling
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group' && hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/Pipfile.lock', '**/poetry.lock') != ''
        run: python -m pip install --require-hashes -r .github/requirements-tools-locked.txt

      - name: Python requirements audit (recursive)
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group' && hashFiles('**/requirements*.txt') != ''
        run: |
          mkdir -p dependency-reports/python
          found=0
          audit_fail=0

          while IFS= read -r req_file; do
            found=1
            rel_path="${req_file#./}"
            safe_name="$(echo "$rel_path" | sed 's#[^A-Za-z0-9._-]#_#g')"
            echo "Auditing Python requirements in: $req_file"

            if ! pip-audit -r "$req_file" --format json --output "dependency-reports/python/${safe_name}.pip-audit.json"; then
              audit_fail=1
            fi
          done < <(find . -type f -name "requirements*.txt" \
            -not -path "*/.venv/*" \
            -not -path "*/venv/*" \
            -not -path "*/node_modules/*" \
            -not -path "*/.git/*" | sort)

          if [ "$found" -eq 0 ]; then
            echo "No requirements*.txt files found for recursive Python audit."
          fi

          if [ "$audit_fail" -ne 0 ]; then
            echo "Python requirements audit found vulnerabilities."
            exit 1
          fi

      - name: Python pyproject audit (recursive)
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group' && hashFiles('**/pyproject.toml') != ''
        run: |
          mkdir -p dependency-reports/python
          found=0
          audit_fail=0

          while IFS= read -r pyproject_file; do
            found=1
            rel_path="${pyproject_file#./}"
            safe_name="$(echo "$rel_path" | sed 's#[^A-Za-z0-9._-]#_#g')"
            req_file="dependency-reports/python/${safe_name}.requirements.txt"

            python - "$pyproject_file" "$req_file" <<'PY'
            import sys
            import tomllib
            from pathlib import Path

            pyproject_path = Path(sys.argv[1])
            req_path = Path(sys.argv[2])
            data = tomllib.loads(pyproject_path.read_text(encoding="utf-8"))
            project = data.get("project", {})
            dependencies = project.get("dependencies", []) or []
            req_path.write_text("".join(f"{dep}\n" for dep in dependencies), encoding="utf-8")
            PY

            if [ ! -s "$req_file" ]; then
              echo "No direct dependencies declared in $pyproject_file"
              continue
            fi

            echo "Auditing Python project dependencies in: $pyproject_file"
            if ! pip-audit -r "$req_file" --format json --output "dependency-reports/python/${safe_name}.pip-audit.json"; then
              audit_fail=1
            fi
          done < <(find . -type f -name "pyproject.toml" \
            -not -path "*/.venv/*" \
            -not -path "*/venv/*" \
            -not -path "*/node_modules/*" \
            -not -path "*/.git/*" | sort)

          if [ "$found" -eq 0 ]; then
            echo "No pyproject.toml files found for Python audit."
          fi

          if [ "$audit_fail" -ne 0 ]; then
            echo "Python pyproject audit found vulnerabilities."
            exit 1
          fi

      - name: Record additional Python lockfiles
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group' && hashFiles('**/Pipfile.lock', '**/poetry.lock', '**/pyproject.toml') != ''
        run: |
          mkdir -p dependency-reports/python
          find . -type f \( -name "Pipfile.lock" -o -name "poetry.lock" -o -name "pyproject.toml" \) \
            -not -path "*/.venv/*" \
            -not -path "*/venv/*" \
            -not -path "*/node_modules/*" \
            -not -path "*/.git/*" | sort > dependency-reports/python/additional-lockfiles.txt
          cat dependency-reports/python/additional-lockfiles.txt

      - name: Upload dependency reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: dependency-reports
          path: dependency-reports/
          if-no-files-found: ignore
          retention-days: 30
