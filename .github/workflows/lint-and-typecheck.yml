name: "🔍 Lint & Type Check"

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    name: "⚡ Ruff (CI-critical targets)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install lint tooling
        run: ./.github/scripts/install-locked-python-deps.sh .github/requirements-tools-locked.txt

      - name: Run Ruff on full codebase
        run: |
          ruff check bot/ twitch_cog/ tests/ scripts/ --output-format=github --target-version=py311
          ruff format bot/ twitch_cog/ tests/ scripts/ --check --target-version=py311

      - name: Run Ruff SARIF (for Security tab)
        if: always()
        run: |
          ruff check bot/ twitch_cog/ tests/ scripts/ --output-format=sarif --target-version=py311 -o ruff.sarif || true

      - name: Upload Ruff SARIF
        if: always() && hashFiles('ruff.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          sarif_file: ruff.sarif
          category: ruff

  mypy:
    name: "🔎 Type Check (mypy)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install lint tooling
        run: ./.github/scripts/install-locked-python-deps.sh .github/requirements-tools-locked.txt

      - name: Run mypy
        run: |
          mypy bot/ twitch_cog/ \
            --ignore-missing-imports \
            --no-error-summary \
            --show-column-numbers \
            --pretty

  pytest:
    name: "✅ Pytest"
    runs-on: ubuntu-latest
    env:
      COVERAGE_FAIL_UNDER: "40"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: ./.github/scripts/install-locked-python-deps.sh .github/requirements-test-ci-locked.txt

      - name: Run regression suite with coverage gate
        run: |
          pytest -q \
            --cov=bot \
            --cov=twitch_cog \
            --cov-branch \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under="${COVERAGE_FAIL_UNDER}"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-coverage
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore
          retention-days: 30

  frontend-ci:
    name: "🧪 Frontend CI (${{ matrix.project.name }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: website
            path: website
          - name: admin_dashboard
            path: bot/admin_dashboard
          - name: dashboard_v2
            path: bot/dashboard_v2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.project.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.project.path }}
        run: npm ci

      - name: Run optional lint script
        working-directory: ${{ matrix.project.path }}
        run: |
          if node -e "const pkg=JSON.parse(require('fs').readFileSync('package.json','utf8')); process.exit(pkg.scripts && pkg.scripts.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script defined for ${{ matrix.project.name }}."
          fi

      - name: Run optional test script
        working-directory: ${{ matrix.project.path }}
        run: |
          if node -e "const pkg=JSON.parse(require('fs').readFileSync('package.json','utf8')); process.exit(pkg.scripts && pkg.scripts.test ? 0 : 1)"; then
            npm test
          else
            echo "No test script defined for ${{ matrix.project.name }}."
          fi

      - name: Build frontend project
        working-directory: ${{ matrix.project.path }}
        run: npm run build
