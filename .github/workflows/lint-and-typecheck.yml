name: "🔍 Lint & Type Check"

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    name: "⚡ Ruff (CI-critical targets)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install lint tooling
        run: ./.github/scripts/install-locked-python-deps.sh .github/requirements-tools-locked.txt

      - name: Run Ruff on curated targets
        run: |
          targets=(
            bot/secret_store.py
            bot/raid/views.py
            bot/dashboard_service/app.py
            tests/test_raid_views_split_api.py
            tests/test_split_bot_api_client.py
            tests/test_dashboard_import_boundaries.py
            tests/test_live_announcement_integration.py
            scripts/test_checkout.py
          )
          existing=()
          for target in "${targets[@]}"; do
            if [ -e "$target" ]; then
              existing+=("$target")
            fi
          done

          if [ ${#existing[@]} -eq 0 ]; then
            echo "No curated lint targets found."
            exit 0
          fi

          printf 'Ruff targets: %s\n' "${existing[*]}"
          ruff check "${existing[@]}" --output-format=github --target-version=py311
          ruff format "${existing[@]}" --check --target-version=py311

  pytest:
    name: "✅ Pytest"
    runs-on: ubuntu-latest
    env:
      COVERAGE_FAIL_UNDER: "40"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: ./.github/scripts/install-locked-python-deps.sh .github/requirements-test-ci-locked.txt

      - name: Run regression suite with coverage gate
        run: |
          pytest -q \
            --cov=bot \
            --cov=twitch_cog \
            --cov-branch \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under="${COVERAGE_FAIL_UNDER}"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pytest-coverage
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore

  frontend-ci:
    name: "🧪 Frontend CI (${{ matrix.project.name }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: website
            path: website
          - name: admin_dashboard
            path: bot/admin_dashboard
          - name: dashboard_v2
            path: bot/dashboard_v2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.project.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.project.path }}
        run: npm ci

      - name: Run optional lint script
        working-directory: ${{ matrix.project.path }}
        run: |
          if node -e "const pkg=JSON.parse(require('fs').readFileSync('package.json','utf8')); process.exit(pkg.scripts && pkg.scripts.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script defined for ${{ matrix.project.name }}."
          fi

      - name: Run optional test script
        working-directory: ${{ matrix.project.path }}
        run: |
          if node -e "const pkg=JSON.parse(require('fs').readFileSync('package.json','utf8')); process.exit(pkg.scripts && pkg.scripts.test ? 0 : 1)"; then
            npm test
          else
            echo "No test script defined for ${{ matrix.project.name }}."
          fi

      - name: Build frontend project
        working-directory: ${{ matrix.project.path }}
        run: npm run build
